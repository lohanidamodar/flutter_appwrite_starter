name: flutter_appwrite_starter
description: A starter application for Flutter + Appwrite projects
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=2.12.0 <3.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  appwrite_auth_kit: ^0.2.1
  crop: ^0.5.2
  crop_your_image: ^0.7.2
  device_info_plus: ^3.2.3
  flutter_riverpod: ^1.0.4
  flutter_svg: ^1.1.0
  google_fonts: ^3.0.1
  image_picker: ^0.8.5+3
  intl: ^0.17.0
  package_info_plus: ^1.4.2
  path_provider: ^2.0.10
  appwrite: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.1
  change_app_package_name: ^1.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/
